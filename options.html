<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>新标签页设置</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 30px; max-width: 500px; }
    h2 { margin-bottom: 20px; }
    .field { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-size: 14px; color: #333; }
    input[type="url"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    .color-row { display: flex; align-items: center; gap: 12px; }
    input[type="color"] { width: 48px; height: 36px; padding: 2px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; }
    .color-presets { display: flex; gap: 8px; flex-wrap: wrap; }
    .preset { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: border-color 0.15s; }
    .preset:hover, .preset.active { border-color: #4285f4; }
    button { padding: 8px 20px; background: #4285f4; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    button:hover { background: #3071e8; }
    .status { margin-top: 10px; font-size: 13px; }
    .tip { font-size: 12px; color: #888; margin-top: 6px; }
  </style>
</head>
<body>
<h2>新标签页设置</h2>

<div class="field">
  <label>跳转地址</label>
  <input type="url" id="urlInput" placeholder="https://www.example.com" />
</div>

<div class="field">
  <label>加载背景色 <span style="color:#888;font-size:12px">（建议填入目标页的背景色，减少闪烁感）</span></label>
  <div class="color-row">
    <input type="color" id="colorPicker" value="#ffffff" />
    <div class="color-presets" id="presets"></div>
  </div>
  <p class="tip">常用预设：</p>
</div>

<button id="saveBtn">保存</button>
<div id="status" class="status"></div>

<script src="options.js"></script>
</body>
</html>
